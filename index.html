<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sall Wakana Services - Magal Finance</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-body: #f0f2f5;
            --primary: #1a237e;
            --accent: #d4af37;
            --success: #00c853;
            --danger: #ff5252;
            --white: #ffffff;
            --shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color:orchid;
            margin: 0;
            padding-bottom: 100px;
        }

        /* --- HEADER DOUBLE LOGO --- */
        header {
            background:oldlace;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border-bottom: 3px solid var(--accent);
            margin-bottom: 25px;
        }

        .logo-box { width: 60px; height: 60px; border-radius: 12px; overflow: hidden; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .header-text { text-align: center; flex: 1; }
        .header-text h1 { margin: 0; font-size: 1.5rem; color: black; text-transform: uppercase; letter-spacing: 1px; }
        .header-text p { margin: 5px 0 0; font-size: 1.75rem; color: var(--accent); font-weight: bold; }

        .container { max-width: 900px; margin: auto; padding: 0 15px; }

        /* --- CARTES MEMBRES --- */
        .membres-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        
        .card {
            background:cyan;
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .status-complet { background: #e8f5e9; color: var(--success); }
        .status-encours { background: #fff3e0; color: #ef6c00; }

        .member-name { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin: 0 0 15px 0; max-width: 70%; }
        
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .val-verse { color: var(--success); font-weight: 800; }
        .val-reste { color: var(--danger); font-weight: 800; }

        .progress-container { height: 8px; background: #eee; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #f1c40f); transition: 1s; }

        /* --- VUE GÉRANT --- */
        .admin-section { display: none; margin-top: 30px; background: #fff; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); }
        body.is-admin .admin-section { display: block; }
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-card { text-align: center; padding: 10px; border-radius: 10px; background: #f8f9fa; }
        .dash-card small { font-size: 0.6rem; text-transform: uppercase; color: #777; }
        .dash-card div { font-weight: 800; font-size: 0.9rem; margin-top: 4px; }

        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        .btn-plus-admin { 
            position: absolute; bottom: 15px; right: 15px; 
            background: var(--primary); color: white; border: none; 
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            display: none;
        }
        body.is-admin .btn-plus-admin { display: block; }

        .lock-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="photo/A.jpeg" alt="Daara" onerror="this.src='https://via.placeholder.com/60?text=Daara'">
    </div>
    
    <div class="header-text">
        <h1>Finance- Magal  DAARA AL MOUSTAKHIMOUNA FIL KHAYAT TOUBA NIMZATH</h1>
        <p>Sall Wakana Services</p>
    </div>

    <div class="logo-box">
        <img src="photo/A.jpeg" alt="SWS" onerror="this.src='https://via.placeholder.com/60?text=SWS'">
    </div>
</header>

<div class="container">
    <div id="listeMembres" class="membres-grid">
        </div>

    <div class="admin-section">
        <div class="dash-grid">
            <div class="dash-card"><small>Collecté</small><div id="totalC" style="color:var(--success)">0</div></div>
            <div class="dash-card"><small>Sorties</small><div id="totalS" style="color:var(--danger)">0</div></div>
            <div class="dash-card"><small>Caisse</small><div id="totalR">0</div></div>
        </div>
        <input type="text" id="m_nom" placeholder="Nom du membre">
        <input type="number" id="m_obj" placeholder="Objectif (ex: 100000)">
        <button class="btn-action" onclick="ajouterMembre()">Inscrire nouveau</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <input type="number" id="s_montant" placeholder="Montant sortie">
        <input type="text" id="s_motif" placeholder="Motif de la sortie">
        <button class="btn-action" style="background:var(--danger)" onclick="ajouterSortie()">Enregistrer sortie</button>
    </div>
</div>

<button class="lock-btn" onclick="login()">🔒</button>

<script>
    // --- CONFIGURATION FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBPrOrKwqMH7UB2Fvl2oNHi539nYCSX_tA",
        authDomain: "magal-finance.firebaseapp.com",
        databaseURL: "https://magal-finance-default-rtdb.firebaseio.com",
        projectId: "magal-finance",
        storageBucket: "magal-finance.firebasestorage.app",
        messagingSenderId: "308196895503",
        appId: "1:308196895503:web:1f1afedf0b4c230f766c7a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        let p = prompt("Code gérant :");
        if(p === "1234ABCD@") { document.body.classList.add('is-admin'); alert("Mode Gérant activé"); }
    }

    function ajouterMembre() {
        const n = document.getElementById('m_nom').value;
        const o = parseInt(document.getElementById('m_obj').value);
        if(n && o) { db.ref('membres').push({nom: n, objectif: o, verse: 0}); }
    }

    function ajouterTranche(id, v) {
        let s = parseInt(prompt("Ajouter montant :"));
        if(s) db.ref('membres/'+id).update({verse: v + s});
    }

    function ajouterSortie() {
        const m = parseInt(document.getElementById('s_montant').value);
        const mo = document.getElementById('s_motif').value;
        if(m) db.ref('sorties').push({montant: m, motif: mo});
    }

    db.ref().on('value', snap => {
        const data = snap.val() || {};
        const membres = data.membres || {};
        const sorties = data.sorties || {};
        
        const list = document.getElementById('listeMembres');
        list.innerHTML = '';
        let tc = 0, ts = 0;

        for(let id in membres) {
            let m = membres[id];
            tc += m.verse;
            let reste = m.objectif - m.verse;
            let pc = (m.verse / m.objectif) * 100;
            let complet = reste <= 0;

            list.innerHTML += `
                <div class="card">
                    <div class="status-badge ${complet ? 'status-complet' : 'status-encours'}">
                        ${complet ? '✔ Complet' : '⏳ En cours'}
                    </div>
                    <h2 class="member-name">${m.nom}</h2>
                    <div class="stats-row">
                        <span>Objectif</span>
                        <strong>${m.objectif.toLocaleString()} F</strong>
                    </div>
                    <div class="stats-row">
                        <span>Déjà versé</span>
                        <span class="val-verse">${m.verse.toLocaleString()} F</span>
                    </div>
                    <div class="stats-row">
                        <span>Reste</span>
                        <span class="val-reste">${(reste < 0 ? 0 : reste).toLocaleString()} F</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width:${pc > 100 ? 100 : pc}%"></div>
                    </div>
                    <button class="btn-plus-admin" onclick="ajouterTranche('${id}', ${m.verse})">+</button>
                </div>
            `;
        }

        for(let id in sorties) ts += sorties[id].montant;

        document.getElementById('totalC').innerText = tc.toLocaleString() + " F";
        document.getElementById('totalS').innerText = ts.toLocaleString() + " F";
        document.getElementById('totalR').innerText = (tc - ts).toLocaleString() + " F";
    });
</script>
</body>
</html>
